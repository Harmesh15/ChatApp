<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Chat App</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Chats</h2>
            </div>
            <div class="user-list">
                <div class="user-card active">
                    <div class="avatar"></div>
                    <div class="user-info">
                        <h4>Aman</h4>
                        <p>Kahan ho bhai?</p>
                    </div>
                </div>
                </div>
        </aside>

        <main class="chat-window">
            <header class="chat-header">
                <div class="user-details">
                    <h3>Aman</h3>
                    <span>Online</span>
                </div>
            </header>

            <div class="message-area" id="messageArea">
                <div class="message sent">
                    <p>Bhai project kaisa chal raha hai?</p>
                    <span class="timestamp">10:05 PM</span>
                </div>
                <div class="message received">
                    <p>Mast! CSS likh raha hoon abhi.</p>
                    <span class="timestamp">10:06 PM</span>
                </div>
            </div>

            <footer class="input-area">
                <input type="text" placeholder="Type a message..." id="msgInput">
                <button class="send-btn">Send</button>
            </footer>
        </main>
    </div>
</body>
</html>
